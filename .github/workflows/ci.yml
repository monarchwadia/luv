name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zig:
    name: Zig (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0
      - name: Format check
        working-directory: core
        run: zig fmt --check src build.zig
      - name: Build wasm
        working-directory: core
        run: zig build wasm
      - name: Run tests
        working-directory: core
        run: zig build test --summary all

  js:
    name: JavaScript / TypeScript (lib/js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        working-directory: lib/js
        run: bun install --frozen-lockfile
      - name: Run tests
        working-directory: lib/js
        run: bun test
      - name: Type-check
        working-directory: lib/js
        run: bun x tsc --noEmit
      - name: Build
        working-directory: lib/js
        run: bun run build
      - name: Bundle-size budget (fail if dist/index.js exceeds 50 KB)
        working-directory: lib/js
        run: |
          SIZE=$(stat -c %s dist/index.js)
          echo "dist/index.js: $SIZE bytes"
          if [ "$SIZE" -gt 51200 ]; then
            echo "::error ::dist/index.js exceeds 50 KB budget ($SIZE bytes)"
            exit 1
          fi
