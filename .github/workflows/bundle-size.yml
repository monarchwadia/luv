name: Bundle size

on:
  pull_request:
    branches: [main]
    paths:
      - "lib/js/**"

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Build
        working-directory: lib/js
        run: bun install --frozen-lockfile && bun run build
      - name: Report sizes
        working-directory: lib/js/dist
        run: |
          echo "## Bundle sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Entry | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---:|" >> $GITHUB_STEP_SUMMARY
          for f in index.js middleware/index.js mcp/index.js; do
            if [ -f "$f" ]; then
              SIZE=$(stat -c %s "$f")
              KB=$(awk "BEGIN { printf \"%.2f\", $SIZE/1024 }")
              echo "| \`$f\` | $KB KB |" >> $GITHUB_STEP_SUMMARY
            fi
          done
