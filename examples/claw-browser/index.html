<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>luv claw — browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0f1115;
      --bg-2: #161922;
      --bg-3: #1d2230;
      --fg: #d8dae0;
      --fg-dim: #8e93a3;
      --accent: #7ea2ff;
      --user: #2a3a5e;
      --assistant: #1d2230;
      --tool: #2a2a2e;
      --error: #5e2a2a;
      --ok: #2a5e3c;
      --border: #2a2f3e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg); color: var(--fg);
      height: 100vh; display: flex; flex-direction: column;
    }
    header {
      padding: 12px 16px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    header > * { font-size: 13px; }
    header label { color: var(--fg-dim); }
    header select, header input[type="password"], header input[type="text"] {
      background: var(--bg-3); color: var(--fg);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 8px; font: inherit;
    }
    header input[type="password"], header input[type="text"] { min-width: 280px; }
    header button {
      background: var(--bg-3); color: var(--fg);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 10px; cursor: pointer; font: inherit;
    }
    header button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    header button:disabled { opacity: 0.4; cursor: not-allowed; }
    #folder-info { color: var(--fg-dim); font-family: monospace; }

    #conversation {
      flex: 1; overflow-y: auto;
      padding: 16px; max-width: 900px; margin: 0 auto; width: 100%;
    }
    .turn {
      margin-bottom: 14px; padding: 10px 14px; border-radius: 8px;
      border: 1px solid var(--border);
    }
    .turn.role-user { background: var(--user); }
    .turn.role-assistant { background: var(--assistant); }
    .turn .role-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--fg-dim); margin-bottom: 6px;
    }
    .turn .block { margin-top: 6px; }
    .turn .block.text { white-space: pre-wrap; word-break: break-word; }
    .turn .block.tool-call, .turn .block.tool-result, .turn .block.error {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px; padding: 8px; border-radius: 6px;
      background: var(--tool); white-space: pre-wrap; word-break: break-word;
    }
    .turn .block.error { background: var(--error); }
    .turn .block.tool-call .name { color: var(--accent); }
    .turn .block.tool-result::before { content: "↳ "; color: var(--fg-dim); }

    #input-row {
      padding: 12px 16px; background: var(--bg-2);
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-end;
      max-width: 900px; margin: 0 auto; width: 100%;
    }
    #input {
      flex: 1; background: var(--bg-3); color: var(--fg);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 10px; font: inherit; resize: vertical;
      min-height: 38px; max-height: 200px;
    }
    #send {
      background: var(--accent); color: #0c0e15;
      border: none; border-radius: 6px;
      padding: 8px 16px; cursor: pointer; font-weight: 600;
    }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }
    #status { color: var(--fg-dim); font-size: 12px; padding: 4px 16px; }

    dialog {
      background: var(--bg-2); color: var(--fg);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 16px; min-width: 380px; max-width: 80%;
    }
    dialog::backdrop { background: rgba(0,0,0,0.5); }
    dialog h3 { margin: 0 0 8px 0; }
    dialog pre {
      background: var(--bg-3); padding: 8px; border-radius: 4px;
      font-size: 12px; white-space: pre-wrap; word-break: break-word;
      max-height: 240px; overflow: auto;
    }
    dialog .actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
    dialog button {
      background: var(--bg-3); color: var(--fg);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 6px 12px; cursor: pointer;
    }
    dialog button.primary { background: var(--accent); color: #0c0e15; border-color: var(--accent); font-weight: 600; }
    dialog button.danger { background: var(--error); border-color: var(--error); }
  </style>
</head>
<body>
  <header>
    <label>provider</label>
    <select id="provider">
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic</option>
    </select>
    <label>model</label>
    <input id="model" type="text" value="gpt-4o-mini" />
    <label>api key</label>
    <input id="api-key" type="password" placeholder="sk-... / sk-ant-..." />
    <button id="open-folder">open folder</button>
    <span id="folder-info">no folder open</span>
  </header>

  <div id="conversation"></div>

  <div id="status"></div>

  <div id="input-row">
    <textarea id="input" placeholder="type a message..." rows="1"></textarea>
    <button id="send" disabled>send</button>
  </div>

  <dialog id="approval">
    <h3>Approve tool call?</h3>
    <p id="approval-tool"></p>
    <pre id="approval-args"></pre>
    <div class="actions">
      <button id="approval-reject" class="danger">reject</button>
      <button id="approval-approve" class="primary">approve</button>
    </div>
  </dialog>

  <script type="module" src="./app.js"></script>
</body>
</html>
