<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>luv-js · isomorphic demo</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 44em; margin: 2em auto; padding: 0 1em; color: #1a1a1a; }
      header { margin-bottom: 1em; }
      header h1 { margin: 0 0 .25em; }
      header p { color: #555; margin: .25em 0; }
      .controls { display: flex; gap: 1em; align-items: center; margin: 1em 0; flex-wrap: wrap; }
      .toggle { display: inline-flex; gap: 0; border: 1px solid #c0c0c0; border-radius: 6px; overflow: hidden; }
      .toggle label { padding: .4em .9em; cursor: pointer; user-select: none; }
      .toggle input { display: none; }
      .toggle input:checked + span { background: #1a73e8; color: white; }
      .toggle span { display: inline-block; padding: 0; }
      textarea { width: 100%; min-height: 4em; padding: .5em; font: inherit; box-sizing: border-box; }
      button { padding: .5em 1.2em; font: inherit; cursor: pointer; }
      button:disabled { opacity: .6; cursor: not-allowed; }
      pre { background: #f6f6f6; padding: 1em; min-height: 6em; white-space: pre-wrap; border-radius: 4px; }
      .meta { color: #666; font-size: .85em; margin-top: .5em; }
      .meta code { background: #ececec; padding: .1em .35em; border-radius: 3px; }
      .badge { display: inline-block; padding: .15em .5em; border-radius: 3px; font-size: .75em; font-weight: 600; }
      .badge.server { background: #e8f0fe; color: #1a73e8; }
      .badge.client { background: #fce8e6; color: #c5221f; }
    </style>
  </head>
  <body>
    <header>
      <h1>luv-js · isomorphic demo</h1>
      <p>Same package, two runtimes. Toggle below to switch where the OpenAI call happens.</p>
    </header>

    <div class="controls">
      <div class="toggle" role="radiogroup" aria-label="Where to run luv-js">
        <label>
          <input type="radio" name="mode" value="server" checked />
          <span>Server-side</span>
        </label>
        <label>
          <input type="radio" name="mode" value="client" />
          <span>Client-side</span>
        </label>
      </div>
      <span id="mode-explainer" class="meta"></span>
    </div>

    <textarea id="prompt">Count from one to five, separated by commas.</textarea>
    <p>
      <button id="go">Send (streaming)</button>
      <button id="cancel" disabled>Cancel</button>
    </p>
    <pre id="output"></pre>
    <p class="meta" id="footer-meta"></p>

    <script type="module">
      import { sendStream } from "/dist/index.js";

      const out = document.getElementById("output");
      const promptEl = document.getElementById("prompt");
      const goBtn = document.getElementById("go");
      const cancelBtn = document.getElementById("cancel");
      const explainer = document.getElementById("mode-explainer");
      const footer = document.getElementById("footer-meta");

      function currentMode() {
        return document.querySelector('input[name="mode"]:checked').value;
      }

      const explainers = {
        server: 'POST → <code>/chat/stream</code> (luv-js runs in Bun on the server)',
        client: 'luv-js runs in this browser tab. Calls api.openai.com directly.',
      };
      function updateExplainer() {
        explainer.innerHTML = explainers[currentMode()];
      }
      document.querySelectorAll('input[name="mode"]').forEach((el) =>
        el.addEventListener("change", updateExplainer),
      );
      updateExplainer();

      // Lazy-fetch the API key from the server only when client-side is used.
      let configPromise = null;
      function getConfig() {
        if (!configPromise) configPromise = fetch("/config").then((r) => r.json());
        return configPromise;
      }

      let activeAbort = null;

      async function runServerSide(text) {
        const controller = new AbortController();
        activeAbort = () => controller.abort();
        const res = await fetch("/chat/stream", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ text }),
          signal: controller.signal,
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          let nl;
          while ((nl = buf.indexOf("\n")) !== -1) {
            const line = buf.slice(0, nl);
            buf = buf.slice(nl + 1);
            if (!line) continue;
            const event = JSON.parse(line);
            if (event.type === "text") out.textContent += event.delta;
          }
        }
      }

      async function runClientSide(text) {
        const config = await getConfig();
        // Calls https://api.openai.com directly from the browser. May fail
        // with CORS — that's the test.
        const stream = sendStream({
          apiKey: config.apiKey,
          model: config.model,
          conversation: [{ role: "user", text }],
          maxTokens: 128,
        });
        activeAbort = () => stream.cancel();
        for await (const event of stream) {
          if (event.type === "text") out.textContent += event.delta;
        }
      }

      goBtn.addEventListener("click", async () => {
        out.textContent = "";
        footer.textContent = "";
        const mode = currentMode();
        const badge = mode === "server"
          ? '<span class="badge server">SERVER</span>'
          : '<span class="badge client">CLIENT</span>';
        footer.innerHTML = `${badge} starting…`;
        goBtn.disabled = true;
        cancelBtn.disabled = false;
        const t0 = performance.now();
        try {
          if (mode === "server") await runServerSide(promptEl.value);
          else await runClientSide(promptEl.value);
          const dt = (performance.now() - t0).toFixed(0);
          footer.innerHTML = `${badge} done in ${dt} ms`;
        } catch (err) {
          footer.innerHTML = `${badge} error: ${err.message}`;
        } finally {
          activeAbort = null;
          goBtn.disabled = false;
          cancelBtn.disabled = true;
        }
      });

      cancelBtn.addEventListener("click", () => {
        if (activeAbort) activeAbort();
      });
    </script>
  </body>
</html>
